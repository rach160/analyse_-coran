<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tafsir - Coran Explorer</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
        .nav-bar { 
            height: 60px; background: #fff; display: flex; 
            align-items: center; justify-content: space-between; 
            padding: 0 20px; border-bottom: 1px solid #ddd;
        }
        .pdf-zone { height: calc(100% - 60px); width: 100%; background: #525659; }
        iframe { width: 100%; height: 100%; border: none; }
        .btn-back { text-decoration: none; color: #0078d4; font-weight: bold; border: 1px solid #0078d4; padding: 5px 12px; border-radius: 4px; }
        
        /* Style du menu simple */
        .menu-popup { display: none; position: absolute; top: 60px; right: 20px; background: white; border: 1px solid #ddd; padding: 15px; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .menu-popup.show { display: block; }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <a href="index.html" class="btn-back">← Accueil</a>
        <div id="currentTomeTitle" style="font-weight: bold;">Chargement...</div>
        <button onclick="toggleMenu()" style="cursor:pointer;">ℹ️ À propos</button>
    </nav>

    <div id="aboutMenu" class="menu-popup">
        <h3>À propos</h3>
        <p>Développeur : Rachid Bounoua</p>
        <p>Application d'analyse du Coran.</p>
    </div>

    <div class="pdf-zone">
        <iframe id="pdf-viewer" src="about:blank"></iframe>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
