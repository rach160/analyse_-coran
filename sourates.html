<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecture & Écoute - Coran Explorer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* Styles spécifiques au lecteur */
        .reader-wrapper { 
            max-width: 950px; 
            margin: 30px auto 150px auto; /* Marge en bas pour ne pas cacher le texte par le lecteur audio */
            padding: 40px; 
            background: white; 
            border-radius: var(--radius); 
            box-shadow: 0 10px 50px rgba(0,0,0,0.05); 
        }

        .surah-header-box { 
            text-align: center; 
            border-bottom: 1px solid #eee; 
            padding-bottom: 30px; 
            margin-bottom: 40px; 
        }

        #quranText { 
            line-height: 3; 
            font-size: 2.3rem; 
            text-align: right; 
            font-family: 'Amiri', serif; 
            word-spacing: 6px; 
            padding: 10px;
            direction: rtl;
        }

        .ayah-circle { 
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M50 5 L95 50 L50 95 L5 50 Z" fill="none" stroke="%230078d4" stroke-width="2"/></svg>');
            background-size: contain;
            background-repeat: no-repeat;
            font-size: 1.1rem;
            font-family: 'Segoe UI', sans-serif;
            color: var(--win-accent);
            margin-left: 10px;
            font-weight: bold;
        }

        /* Barre Audio Fixe en bas (Style Windows 11) */
        .audio-dock {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 700px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 100px;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            z-index: 9999;
        }

        audio { flex-grow: 1; height: 35px; }

        .btn-tafsir-link {
            background: #f0f7ff;
            color: var(--win-accent);
            border: 1px solid #cce3f5;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
        }

        .btn-tafsir-link:hover { background: #e1effa; }

        @media (max-width: 600px) {
            #quranText { font-size: 1.6rem; }
            .audio-dock { padding: 10px 15px; border-radius: 20px; bottom: 10px; }
        }
    </style>
</head>
<body class="page-transition">

    <nav class="win11-nav">
        <div class="nav-content">
            <a href="index.html" class="logo" style="text-decoration:none">📖 Coran Explorer</a>
            <div id="navInfo" style="font-weight:600; color:var(--win-accent);">Chargement...</div>
        </div>
    </nav>

    <main class="reader-wrapper">
        <div class="surah-header-box">
            <button onclick="window.location.href='index.html'" class="btn-action btn-tafsir" style="margin-bottom:20px;">← Retour à l'index</button>
            <h1 id="surahFr">...</h1>
            <h2 id="surahAr" class="ar-name" style="font-size: 3.5rem;"></h2>
            <p id="surahMeta" style="color:#666; font-size: 0.9rem;"></p>
            
            <a href="#" id="btnGoToTafsir" class="btn-tafsir-link">Consulter l'explication (Tafsir)</a>
        </div>

        <div id="quranText">
            <p style="text-align:center; font-style:italic; color:#999;">Téléchargement des versets...</p>
        </div>
    </main>

    <div class="audio-dock">
        <div style="font-size: 0.75rem; font-weight: bold; color: #555; min-width: 70px;">RÉCITATION</div>
        <audio id="player" controls>
            <source id="audioSrc" src="" type="audio/mpeg">
        </audio>
    </div>

    <script>
        // 1. Récupération des paramètres
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id') || 1;

        // 2. Configuration du lien Tafsir
        document.getElementById('btnGoToTafsir').href = `tafsir.html?id=${id}`;

        // 3. Chargement des données
        async function loadSurah() {
            const container = document.getElementById('quranText');
            try {
                // Récupération du texte Arabe
                const response = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
                const result = await response.json();
                const surah = result.data;

                // Mise à jour de l'interface
                document.getElementById('surahAr').textContent = surah.name;
                document.getElementById('surahFr').textContent = surah.englishName;
                document.getElementById('navInfo').textContent = `Sourate ${surah.number} : ${surah.englishName}`;
                document.getElementById('surahMeta').textContent = `${surah.revelationType} • ${surah.numberOfAyahs} Versets`;

                // Construction du texte (en gérant la Basmala si nécessaire)
                let fullContent = "";
                
                surah.ayahs.forEach(ayah => {
                    fullContent += `${ayah.text} <span class="ayah-circle">${ayah.numberInSurah}</span> `;
                });

                container.innerHTML = fullContent;

                // 4. Chargement de l'Audio (Mishary Rashid Alafasy)
                const player = document.getElementById('player');
                const source = document.getElementById('audioSrc');
                source.src = `https://cdn.islamic.network/quran/audio-surah/128/ar.alafasy/${id}.mp3`;
                player.load();

            } catch (error) {
                container.innerHTML = "<p style='text-align:center; color:red;'>Erreur réseau. Impossible de charger la sourate.</p>";
                console.error(error);
            }
        }

        // Lancement au chargement
        window.onload = loadSurah;
    </script>
</body>
</html>
